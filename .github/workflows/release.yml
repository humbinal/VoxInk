# 发布 workflow（M13，§11.3）：push 形如 vX.Y.Z 的 tag 时，构建 Windows release
# 并把 VoxInk.exe + VoxInk.exe.sha256 作为产物发布到对应 GitHub Release。
# 与 ci.yml（PR 门禁）互不替代。
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # 校验 Cargo.toml 版本与 tag 一致（§11.2 版本号契约），不一致即失败，
      # 防止 tag 与代码版本漂移。
      - name: 校验版本号与 tag 一致
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $tagVer = $tag -replace '^v', ''
          $line = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $cargoVer = $line.Matches[0].Groups[1].Value
          Write-Host "tag=$tag tagVer=$tagVer cargoVer=$cargoVer"
          if ($tagVer -ne $cargoVer) {
            Write-Error "tag 版本 ($tagVer) 与 Cargo.toml 版本 ($cargoVer) 不一致"
            exit 1
          }

      - name: 构建 release
        run: cargo build --release

      - name: 生成 SHA256 校验文件
        shell: pwsh
        run: |
          $exe = "target/release/VoxInk.exe"
          $hash = (Get-FileHash -Path $exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$exe.sha256" -Value $hash -NoNewline
          Write-Host "SHA256=$hash"

      # 发布说明取自带注释 tag 的消息（git tag -a vX.Y.Z -m "..."）。
      # 经 GitHub API 读取 tag 对象的 message——actions/checkout 不可靠保留注释，
      # 直接 git tag --format='%(contents)' 会回退成提交说明，故走 API。
      - name: 提取 tag 注释作为发布说明
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          obj_type=$(gh api "repos/${{ github.repository }}/git/ref/tags/${tag}" --jq '.object.type')
          obj_sha=$(gh api "repos/${{ github.repository }}/git/ref/tags/${tag}" --jq '.object.sha')
          if [ "$obj_type" = "tag" ]; then
            gh api "repos/${{ github.repository }}/git/tags/${obj_sha}" --jq '.message' > RELEASE_BODY.md
          else
            # 轻量 tag：回退到提交说明。
            gh api "repos/${{ github.repository }}/git/commits/${obj_sha}" --jq '.message' > RELEASE_BODY.md
          fi
          echo "----- RELEASE_BODY.md -----"
          cat RELEASE_BODY.md

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # body 取自 tag 注释；产物命名须与客户端 update.rs 约定一致（§11.3）。
          body_path: RELEASE_BODY.md
          files: |
            target/release/VoxInk.exe
            target/release/VoxInk.exe.sha256
