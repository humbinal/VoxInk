[package]
name = "VoxInk"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[dependencies]
# GUI 渲染框架（§1.4）
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed", features = ["font-kit", "runtime_shaders"] }
gpui-component = { git = "https://github.com/longbridge/gpui-component" }
gpui-component-assets = { git = "https://github.com/longbridge/gpui-component" }

# 异步运行时（§1.4）
tokio = { version = "1", features = ["rt-multi-thread"] }

# 配置与序列化（§1.4）
serde = { version = "1", features = ["derive"] }

# 日志（M1 任务 1.3）
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# 错误处理（§1.4）
thiserror = "2"
anyhow = "1"

# 日期时间（§1.4）
chrono = { version = "0.4.44", features = ["std", "serde"] }

# 配置持久化（§2.7, §8）
toml = "0.8"
directories = "6"

# 剪贴板（§4.3.2，任务 2.2）
arboard = "3"

# API Key 加密：纯 Rust，AES-256-GCM + HKDF（§8.3，任务 2.4）。不使用 ring。
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
base64 = "0.22"
getrandom = "0.2"
machine-uid = "0.5"

[build-dependencies]
winresource = "0.1.31"
